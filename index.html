<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unfinished Imaginations</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
            background: linear-gradient(to bottom, rgba(13,13,13,0.7), #0d0d0d),
                        url('https://images.unsplash.com/photo-1478720568477-152d9b164e26?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
        }
        h1 { font-size: clamp(50px, 12vw, 100px); line-height: 0.9; margin-bottom: 25px; letter-spacing: -2px; }
        .cta-btn {
            display: inline-block;
            padding: 15px 45px;
            border: 1px solid #c5a059;
            color: #c5a059;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 13px;
            transition: 0.5s;
        }
        .cta-btn:hover { background-color: #c5a059; color: #0d0d0d; box-shadow: 0 0 20px rgba(197, 160, 89, 0.3); }
    </style>
</head>
<body>
    <div class="hero">
        <h1>NOW<br>SHOWING</h1>
        <p style="color:#888; margin-bottom:40px; font-size:20px;">Unfinished Imaginations</p>
        <a href="main.html" class="cta-btn">Enter Cinema</a>
    </div>
</body>
</html>
